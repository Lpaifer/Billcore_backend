spring.application.name=billcore
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/billcore
spring.datasource.username=postgres
spring.datasource.password=2212
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=BillCoreSecretKeyForJwtMustBeAtLeastThirtyTwoChars!
app.security.jwt.expiration-seconds=3600
